<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kevin — {{ .IssueID }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
        h1 { color: #58a6ff; margin-bottom: 4px; font-size: 18px; }
        .meta { color: #8b949e; margin-bottom: 24px; font-size: 13px; }
        .meta a { color: #58a6ff; text-decoration: none; }
        .status { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .status-running { background: #1f6feb33; color: #58a6ff; }
        .status-assessing { background: #1f6feb33; color: #58a6ff; }
        .status-review { background: #8957e533; color: #bc8cff; }
        .status-done { background: #23863633; color: #3fb950; }
        .status-failed { background: #da363333; color: #f85149; }
        .status-stuck { background: #9e6a0333; color: #d29922; }
        .status-killed, .status-pending { background: #21262d; color: #8b949e; }
        .back { color: #8b949e; text-decoration: none; font-size: 13px; }
        .back:hover { color: #58a6ff; }
        .stream { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 16px; font-size: 12px; font-family: monospace; min-height: 300px; max-height: calc(100vh - 200px); overflow-y: auto; }
        .line { padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
        .line-system { color: #484f58; }
        .line-text { color: #c9d1d9; }
        .line-thinking { color: #484f58; font-style: italic; }
        .line-tool { color: #d2a8ff; }
        .line-tool-result { color: #8b949e; }
        .line-result { color: #3fb950; font-weight: 600; }
        .line-error { color: #f85149; }
        .connected { color: #3fb950; font-size: 11px; }
        .disconnected { color: #f85149; font-size: 11px; }
    </style>
</head>
<body>
    <a class="back" href="/ui">&larr; dashboard</a>
    <h1>{{ .IssueID }}: {{ .Title }}</h1>
    <p class="meta">
        <span class="status status-{{ .Status }}">{{ .Status }}</span>
        {{ if .PRURL }}&middot; <a href="{{ .PRURL }}">PR</a>{{ end }}
        &middot; run #{{ .ID }}
        <span id="conn" class="connected">live</span>
    </p>

    <div class="stream" id="stream">
        <div class="line line-system">loading logs...</div>
    </div>

    <script>
        const stream = document.getElementById("stream");
        const conn = document.getElementById("conn");
        const runID = {{ .ID }};

        function classForEvent(ev) {
            if (ev.type === "system") return "line-system";
            if (ev.type === "result") return ev.subtype === "error" ? "line-error" : "line-result";
            if (ev.type === "assistant" && ev.message) {
                const c = ev.message.content || [];
                if (c.some(b => b.type === "tool_use")) return "line-tool";
                if (c.some(b => b.type === "thinking")) return "line-thinking";
                return "line-text";
            }
            if (ev.type === "user") return "line-tool-result";
            return "line-system";
        }

        function formatEvent(ev) {
            if (ev.type === "system" && ev.subtype === "init") {
                return "[init] session=" + (ev.session_id || "").slice(0,12) + " model=" + (ev.model || "?") + " tools=" + ((ev.tools||[]).length);
            }
            if (ev.type === "system" && ev.subtype === "task_started") {
                return "[task] " + (ev.description || "started");
            }
            if (ev.type === "assistant" && ev.message) {
                const blocks = ev.message.content || [];
                return blocks.map(b => {
                    if (b.type === "text") return b.text;
                    if (b.type === "thinking") return "[thinking] " + (b.thinking || "").slice(0, 150) + "...";
                    if (b.type === "tool_use") return "[tool] " + b.name + "(" + JSON.stringify(b.input || {}).slice(0, 100) + ")";
                    return "[" + b.type + "]";
                }).join("\n");
            }
            if (ev.type === "user" && ev.tool_use_result) {
                const r = ev.tool_use_result;
                let text = '';
                if (typeof r === 'string') text = r;
                else if (Array.isArray(r)) text = r.map(x => x.text || '').join(' ');
                else if (r.stdout !== undefined) text = r.stdout || r.stderr || '';
                else text = JSON.stringify(r);
                const bytes = text.length;
                const size = bytes >= 1024 ? (bytes/1024).toFixed(1) + 'kb' : bytes + 'b';
                const preview = text.replace(/\s+/g, ' ').slice(0, 200);
                return "[result] (" + size + ") " + (preview || "(empty)") + (text.length > 200 ? '…' : '');
            }
            if (ev.type === "result") {
                return "[" + ev.subtype + "] " + (ev.result || "").slice(0, 300) + " (" + (ev.num_turns||0) + " turns, " + (ev.duration_ms||0) + "ms)";
            }
            return JSON.stringify(ev).slice(0, 300);
        }

        const roleColors = { angela: "#bc8cff", darryl: "#58a6ff", kevin: "#d29922" };

        function addLine(raw, prepend) {
            // Format: role\tjson
            let role = "";
            let json = raw;
            const tab = raw.indexOf("\t");
            if (tab > 0 && tab < 10) {
                role = raw.slice(0, tab);
                json = raw.slice(tab + 1);
            }

            try {
                const ev = JSON.parse(json);
                const cls = classForEvent(ev);
                const text = formatEvent(ev);
                const prefix = role ? '<span style="color:' + (roleColors[role]||"#8b949e") + ';font-weight:600">[' + role + ']</span> ' : '';
                text.split("\n").forEach(line => {
                    const div = document.createElement("div");
                    div.className = "line " + cls;
                    div.innerHTML = prefix + escapeHtml(line);
                    if (prepend) stream.prepend(div);
                    else stream.appendChild(div);
                });
            } catch(e) {
                const div = document.createElement("div");
                div.className = "line line-system";
                div.textContent = (role ? "[" + role + "] " : "") + json.slice(0, 300);
                if (prepend) stream.prepend(div);
                else stream.appendChild(div);
            }
        }

        function escapeHtml(s) {
            return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        // Load full log history
        fetch("/ui/logs/" + runID)
            .then(r => r.text())
            .then(text => {
                stream.innerHTML = "";
                const lines = text.split("\n").filter(l => l.trim());
                if (lines.length === 0) {
                    stream.innerHTML = '<div class="line line-system">no logs yet</div>';
                } else {
                    lines.forEach(l => addLine(l, false));
                    stream.scrollTop = stream.scrollHeight;
                }
            })
            .catch(() => {
                stream.innerHTML = '<div class="line line-system">failed to load logs</div>';
            });

        // SSE for live updates
        const es = new EventSource("/ui/events/" + runID);
        es.onmessage = function(e) {
            // Remove "no logs yet" placeholder
            const placeholder = stream.querySelector('.line-system');
            if (placeholder && placeholder.textContent === "no logs yet") placeholder.remove();
            addLine(e.data, false);
            stream.scrollTop = stream.scrollHeight;
        };
        es.onerror = function() {
            conn.textContent = "disconnected";
            conn.className = "disconnected";
        };
    </script>
</body>
</html>
